{% extends 'app/base.html' %}
{% load static %}
{% block title %}Password Reset Complete{% endblock title %}

{% block main-content %}

<div class="auth-wrapper d-flex align-items-center justify-content-center py-5">
  <div class="container my-4">
    <div class="row justify-content-center">
      <div class="col-md-6 col-lg-5">
        <div class="glass-panel auth-card p-4 p-md-5 text-center">
          <div class="auth-icon-container mb-4">
            <i class="fas fa-check-circle auth-icon"></i>
          </div>
          <h2 class="auth-title text-success">PASSWORD RESET</h2>
          <div class="title-underline sm bg-success shadow-success mx-auto mt-2 mb-4"></div>
          
          <div class="mb-4 d-flex justify-content-center rounded overflow-hidden" style="border: 2px solid rgba(0,255,136,0.3); box-shadow: 0 0 15px rgba(0,255,136,0.2);">
              <iframe src="https://giphy.com/embed/Tf5N3Y2TO6jwGg5Msw" width="100%" height="240" frameborder="0"
                  class="giphy-embed" allowFullScreen style="pointer-events: none;"></iframe>
          </div>
          
          <div class="border-top-glass pt-4 mt-2">
            <a href="/accounts/login" class="btn btn-premium-success w-100 py-3">
              PROCEED TO LOGIN <i class="fas fa-sign-in-alt ms-2"></i>
            </a>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<style>
  .auth-wrapper {
      min-height: calc(100vh - 80px);
      margin-top: 80px;
      background-color: #050505;
      background-image: 
          radial-gradient(circle at 10% 50%, rgba(0, 255, 136, 0.08), transparent 50%),
          radial-gradient(circle at 90% 50%, rgba(0, 247, 255, 0.05), transparent 50%),
          url("{% static 'app/images/login.jpg' %}");
      background-size: cover;
      background-position: center;
      background-attachment: fixed;
      background-blend-mode: overlay;
      font-family: 'Inter', sans-serif;
  }
  .glass-panel {
      background: rgba(10, 10, 10, 0.75);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 20px;
      box-shadow: 0 15px 35px rgba(0,0,0,0.5), inset 0 0 0 1px rgba(255, 255, 255, 0.05);
  }
  .auth-card { position: relative; overflow: hidden; }
  .auth-card::before {
      content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px;
      background: linear-gradient(90deg, transparent, #00ff88, transparent);
  }
  .auth-title {
      font-family: 'Montserrat', sans-serif;
      font-size: 1.6rem; font-weight: 800; letter-spacing: 2px; margin-bottom: 5px;
  }
  .title-underline.sm {
      width: 40px; height: 3px; border-radius: 2px;
  }
  .bg-success { background-color: #00ff88 !important; }
  .text-success { color: #00ff88 !important; text-shadow: 0 0 10px rgba(0, 255, 136, 0.5); }
  .shadow-success { box-shadow: 0 0 10px #00ff88; }
  .auth-icon-container {
      display: inline-flex; align-items: center; justify-content: center;
      width: 80px; height: 80px; border-radius: 50%;
      background: rgba(0, 255, 136, 0.1);
      border: 1px solid rgba(0, 255, 136, 0.3);
      box-shadow: 0 0 20px rgba(0, 255, 136, 0.2);
  }
  .auth-icon { font-size: 2.5rem; color: #00ff88; text-shadow: 0 0 10px rgba(0, 255, 136, 0.5); }
  .btn-premium-success {
      background: linear-gradient(45deg, #00cc66, #00ff88); color: #000;
      border: none; font-weight: 700; letter-spacing: 1.5px; border-radius: 12px;
      box-shadow: 0 5px 15px rgba(0, 255, 136, 0.3); transition: all 0.3s ease; text-transform: uppercase; text-decoration: none; display: inline-block;
  }
  .btn-premium-success:hover { transform: translateY(-2px); box-shadow: 0 10px 20px rgba(0, 255, 136, 0.5); color: #000; }
  .border-top-glass { border-top: 1px solid rgba(255, 255, 255, 0.08); }
</style>
{% endblock main-content %}
